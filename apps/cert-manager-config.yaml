# ClusterIssuer for Let's Encrypt. Wave 4 — cert-manager CRDs must exist first (wave 2).
# Uses the DNS-01 challenge via Cloudflare (see manifests/cert-manager/cluster-issuer.yaml),
# which works behind the Cloudflare proxy. Replace the email with your own before issuing certs.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  source:
    repoURL: https://github.com/Franta89/gitops.git
    targetRevision: main
    path: manifests/cert-manager
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
