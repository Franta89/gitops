# kube-prometheus-stack: Prometheus + Grafana + node-exporter + kube-state-metrics.
# Wave 3. Grafana: https://dailydoseoftech.org/grafana  login: admin / grafana-admin-changeme
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 62.3.0   # TODO: verify latest
    helm:
      releaseName: monitoring
      values: |
        grafana:
          admin:
            existingSecret: "grafana-admin-secret"
            userKey: "admin-user"
            passwordKey: "admin-password"
          persistence:
            enabled: true
            size: 1Gi
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          # Grafana is exposed via Gateway API, not Ingress. The route lives in
          # manifests/monitoring/grafana-httproute.yaml (attached to ddot-gateway).
          ingress:
            enabled: false
          grafana.ini:
            server:
              root_url: "https://dailydoseoftech.org/grafana"
              serve_from_sub_path: true
        prometheus:
          prometheusSpec:
            retention: 3d
            resources:
              requests:
                cpu: 100m
                memory: 400Mi
              limits:
                memory: 800Mi
            storageSpec:
              volumeClaimTemplate:
                spec:
                  resources:
                    requests:
                      storage: 5Gi
            # Scrape ALL PodMonitors and ServiceMonitors across all namespaces.
            podMonitorSelectorNilUsesHelmValues: false
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorNamespaceSelector: {}
            podMonitorSelector: {}
            serviceMonitorNamespaceSelector: {}
            serviceMonitorSelector: {}
        alertmanager:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
