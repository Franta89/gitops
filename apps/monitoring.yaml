# kube-prometheus-stack: Prometheus + Grafana + node-exporter + kube-state-metrics.
# Wave 3. Grafana: https://dailydoseoftech.org/grafana  login: admin / grafana-admin-changeme
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 62.3.0   # TODO: verify latest
    helm:
      releaseName: monitoring
      values: |
        grafana:
          adminPassword: "grafana-admin-changeme"
          persistence:
            enabled: true
            size: 1Gi
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          ingress:
            enabled: true
            ingressClassName: nginx
            annotations:
              cert-manager.io/cluster-issuer: letsencrypt-prod
              nginx.ingress.kubernetes.io/ssl-redirect: "true"
            hosts:
              - dailydoseoftech.org
            path: /grafana
            tls:
              - secretName: grafana-tls
                hosts:
                  - dailydoseoftech.org
          grafana.ini:
            server:
              root_url: "https://dailydoseoftech.org/grafana"
              serve_from_sub_path: true
        prometheus:
          prometheusSpec:
            retention: 3d
            resources:
              requests:
                cpu: 100m
                memory: 400Mi
              limits:
                memory: 800Mi
            storageSpec:
              volumeClaimTemplate:
                spec:
                  resources:
                    requests:
                      storage: 5Gi
            # Scrape ALL PodMonitors and ServiceMonitors across all namespaces.
            podMonitorSelectorNilUsesHelmValues: false
            serviceMonitorSelectorNilUsesHelmValues: false
            podMonitorNamespaceSelector: {}
            podMonitorSelector: {}
        alertmanager:
          enabled: false
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
