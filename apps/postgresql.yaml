# PostgreSQL for storing puzzle game events.
# TODO: move auth.password to a SealedSecret before any public exposure.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: postgresql
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "3"
spec:
  project: default
  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: postgresql
    targetRevision: 15.5.38   # TODO: verify latest
    helm:
      releaseName: postgresql
      values: |
        auth:
          username: puzzle
          password: puzzle-dev-changeme
          database: puzzle_events
        primary:
          persistence:
            size: 1Gi
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: puzzle
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
