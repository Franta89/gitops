# Installs cert-manager. Wave 2 so CRDs exist before the ClusterIssuer (wave 4).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    targetRevision: v1.15.3   # TODO: verify latest
    helm:
      releaseName: cert-manager
      values: |
        installCRDs: true
        # Expose cert-manager metrics + a ServiceMonitor so the Grafana dashboard
        # can show certificate time-to-expiry (certmanager_certificate_expiration_*).
        prometheus:
          enabled: true
          servicemonitor:
            enabled: true
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
