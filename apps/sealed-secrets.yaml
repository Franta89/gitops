# Bitnami SealedSecrets operator — encrypts Secrets so they can be safely committed to git.
# Wave 2: controller must be running before any SealedSecret resources are applied (waves 4+).
#
# After first deploy, fetch the cluster public cert once:
#   kubeseal --fetch-cert \
#     --controller-name=sealed-secrets-controller \
#     --controller-namespace=kube-system \
#     > pub-cert.pem
# Then seal each secret (see *.yaml.example files next to each secret):
#   kubeseal --cert pub-cert.pem --format yaml < secret.yaml > sealedsecret.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://bitnami-labs.github.io/sealed-secrets
    chart: sealed-secrets
    targetRevision: "2.16.2"  # TODO: verify latest at https://github.com/bitnami-labs/sealed-secrets/releases
    helm:
      releaseName: sealed-secrets-controller
      values: |
        fullnameOverride: sealed-secrets-controller
  destination:
    server: https://kubernetes.default.svc
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
