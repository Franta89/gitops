# Installs the Strimzi operator from its Helm chart. Sync wave 0 so the CRDs
# exist before the Kafka cluster (wave 1) is applied.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: strimzi-operator
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  project: default
  source:
    repoURL: https://strimzi.io/charts/
    chart: strimzi-kafka-operator
    targetRevision: 0.50.0   # TODO: confirm latest Strimzi chart version
    helm:
      releaseName: strimzi
      values: |
        watchAnyNamespace: false
  destination:
    server: https://kubernetes.default.svc
    namespace: kafka
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
