# Installs the NGINX ingress controller. Wave 2 — assigns a public Azure IP via
# LoadBalancer service. The azure-dns-label-name annotation gives a free Azure
# subdomain: kafka-puzzle.swedencentral.cloudapp.azure.com
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ingress-nginx
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://kubernetes.github.io/ingress-nginx
    chart: ingress-nginx
    targetRevision: 4.11.3   # TODO: verify latest
    helm:
      releaseName: ingress-nginx
      values: |
        controller:
          service:
            type: LoadBalancer
            annotations:
              service.beta.kubernetes.io/azure-dns-label-name: "kafka-puzzle"
              # Azure LB HTTP probe uses path / by default; NGINX returns 404 there
              # which marks the backend unhealthy and drops all inbound connections.
              # /healthz returns 200 on both port 80 and 443.
              service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: "/healthz"
          ingressClassResource:
            default: true
          metrics:
            enabled: true
            serviceMonitor:
              enabled: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: ingress-nginx
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
