apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-ddot-platform
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  ddot-platform.json: |
    {
      "description": "Cluster utilisation, web traffic and application health for dailydoseoftech.org",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "panels": [
        {
          "type": "row",
          "title": "Cluster Health",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 0},
          "id": 1,
          "collapsed": false
        },
        {
          "id": 2,
          "title": "CPU Utilisation",
          "type": "gauge",
          "gridPos": {"h": 7, "w": 4, "x": 0, "y": 1},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "CPU %",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 60},
                  {"color": "red", "value": 85}
                ]
              },
              "color": {"mode": "thresholds"}
            }
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          }
        },
        {
          "id": 3,
          "title": "Memory Utilisation",
          "type": "gauge",
          "gridPos": {"h": 7, "w": 4, "x": 4, "y": 1},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "(1 - avg(node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100",
              "legendFormat": "Memory %",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 70},
                  {"color": "red", "value": 90}
                ]
              },
              "color": {"mode": "thresholds"}
            }
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          }
        },
        {
          "id": 4,
          "title": "Running Pods",
          "type": "stat",
          "gridPos": {"h": 3, "w": 4, "x": 8, "y": 1},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{phase=\"Running\"})",
              "legendFormat": "Running",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {"mode": "fixed", "fixedColor": "green"},
              "thresholds": {
                "mode": "absolute",
                "steps": [{"color": "green", "value": null}]
              }
            }
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none"
          }
        },
        {
          "id": 5,
          "title": "Pending / Failed Pods",
          "type": "stat",
          "gridPos": {"h": 4, "w": 4, "x": 8, "y": 4},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "count(kube_pod_status_phase{phase=~\"Pending|Failed\"}) or vector(0)",
              "legendFormat": "Unhealthy",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "red", "value": 1}
                ]
              },
              "color": {"mode": "thresholds"}
            }
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          }
        },
        {
          "id": 6,
          "title": "CPU & Memory — Node",
          "type": "timeseries",
          "gridPos": {"h": 7, "w": 12, "x": 12, "y": 1},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "100 - (avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "CPU %",
              "refId": "A"
            },
            {
              "expr": "(1 - avg(node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100",
              "legendFormat": "Memory %",
              "refId": "B"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100
            }
          },
          "options": {
            "tooltip": {"mode": "multi", "sort": "none"}
          }
        },
        {
          "type": "row",
          "title": "Application Health — news-digest",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 8},
          "id": 20,
          "collapsed": false
        },
        {
          "id": 21,
          "title": "Pod Restarts — Last 24h",
          "type": "bargauge",
          "gridPos": {"h": 7, "w": 8, "x": 0, "y": 9},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "sum by(pod)(increase(kube_pod_container_status_restarts_total{namespace=\"news-digest\"}[24h]))",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "min": 0,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 1},
                  {"color": "red", "value": 5}
                ]
              },
              "color": {"mode": "thresholds"}
            }
          },
          "options": {
            "orientation": "horizontal",
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "displayMode": "gradient",
            "showUnfilled": true
          }
        },
        {
          "id": 22,
          "title": "Container Memory — news-digest",
          "type": "timeseries",
          "gridPos": {"h": 7, "w": 10, "x": 8, "y": 9},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "sum by(pod)(container_memory_working_set_bytes{namespace=\"news-digest\", container!=\"\", container!=\"POD\"})",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "bytes"}
          },
          "options": {
            "tooltip": {"mode": "multi", "sort": "desc"},
            "legend": {"displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"]}
          }
        },
        {
          "id": 23,
          "title": "PostgreSQL PVC Used",
          "type": "gauge",
          "gridPos": {"h": 7, "w": 6, "x": 18, "y": 9},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "kubelet_volume_stats_used_bytes{namespace=\"news-digest\"} / kubelet_volume_stats_capacity_bytes{namespace=\"news-digest\"} * 100",
              "legendFormat": "{{persistentvolumeclaim}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 70},
                  {"color": "red", "value": 90}
                ]
              },
              "color": {"mode": "thresholds"}
            }
          },
          "options": {
            "reduceOptions": {"calcs": ["lastNotNull"]},
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          }
        },
        {
          "id": 24,
          "title": "Container CPU — news-digest",
          "type": "timeseries",
          "gridPos": {"h": 7, "w": 12, "x": 0, "y": 16},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "sum by(pod)(rate(container_cpu_usage_seconds_total{namespace=\"news-digest\", container!=\"\", container!=\"POD\"}[5m]))",
              "legendFormat": "{{pod}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "percentunit"}
          },
          "options": {
            "tooltip": {"mode": "multi", "sort": "desc"}
          }
        },
        {
          "id": 25,
          "title": "Aggregator CronJob — Last Run",
          "type": "table",
          "gridPos": {"h": 7, "w": 12, "x": 12, "y": 16},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [
            {
              "expr": "kube_job_status_completion_time{namespace=\"news-digest\"} * 1000",
              "legendFormat": "{{job_name}}",
              "refId": "A",
              "instant": true
            },
            {
              "expr": "kube_job_status_failed{namespace=\"news-digest\"}",
              "legendFormat": "{{job_name}} failed",
              "refId": "B",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {"unit": "dateTimeFromNow"},
            "overrides": []
          },
          "options": {
            "sortBy": [{"displayName": "Time", "desc": true}],
            "footer": {"show": false}
          },
          "transformations": [
            {"id": "labelsToFields", "options": {"mode": "columns"}},
            {"id": "organize", "options": {}}
          ]
        },
        {
          "type": "row",
          "title": "Site Traffic — Cloudflare",
          "gridPos": {"h": 1, "w": 24, "x": 0, "y": 23},
          "id": 30,
          "collapsed": false
        },
        {
          "id": 31,
          "title": "Unique Visitors (yesterday)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 0, "y": 24},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "ddot_cloudflare_uniques{period=\"yesterday\"}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "fixed", "fixedColor": "green"}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "value"}
        },
        {
          "id": 32,
          "title": "Total Requests (yesterday)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 6, "y": 24},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "ddot_cloudflare_requests{period=\"yesterday\"}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "fixed", "fixedColor": "blue"}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "value"}
        },
        {
          "id": 33,
          "title": "Bandwidth (yesterday)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 12, "y": 24},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "ddot_cloudflare_bytes{period=\"yesterday\"}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "bytes", "color": {"mode": "fixed", "fixedColor": "purple"}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "value"}
        },
        {
          "id": 34,
          "title": "Threats Blocked (yesterday)",
          "type": "stat",
          "gridPos": {"h": 4, "w": 6, "x": 18, "y": 24},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "ddot_cloudflare_threats{period=\"yesterday\"}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "short", "thresholds": {"mode": "absolute", "steps": [{"color": "green", "value": null}, {"color": "red", "value": 1}]}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background"}
        },
        {
          "id": 35,
          "title": "Requests — today (running total)",
          "type": "timeseries",
          "gridPos": {"h": 7, "w": 12, "x": 0, "y": 28},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "ddot_cloudflare_requests{period=\"today\"}", "legendFormat": "requests today", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "short", "custom": {"fillOpacity": 20, "showPoints": "never"}}},
          "options": {"tooltip": {"mode": "multi", "sort": "none"}}
        },
        {
          "id": 36,
          "title": "Unique Visitors — yesterday vs today",
          "type": "bargauge",
          "gridPos": {"h": 7, "w": 12, "x": 12, "y": 28},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "ddot_cloudflare_uniques", "legendFormat": "{{period}}", "refId": "A", "instant": true}],
          "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "continuous-GrYlRd"}}},
          "options": {"orientation": "horizontal", "displayMode": "gradient", "reduceOptions": {"calcs": ["lastNotNull"]}}
        },
        {
          "id": 37,
          "title": "Page Views (yesterday)",
          "type": "stat",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 35},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "ddot_cloudflare_pageviews{period=\"yesterday\"}", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "fixed", "fixedColor": "blue"}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "value"}
        },
        {
          "id": 38,
          "title": "TLS Cert — time to expiry",
          "type": "stat",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 35},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "min(certmanager_certificate_expiration_timestamp_seconds{name=\"dailydoseoftech-tls\"}) - time()", "refId": "A"}],
          "fieldConfig": {"defaults": {"unit": "s", "thresholds": {"mode": "absolute", "steps": [{"color": "red", "value": null}, {"color": "yellow", "value": 1209600}, {"color": "green", "value": 2592000}]}}},
          "options": {"reduceOptions": {"calcs": ["lastNotNull"]}, "colorMode": "background"}
        },
        {
          "id": 39,
          "title": "Unique Visitors per Day (last 30d)",
          "type": "barchart",
          "gridPos": {"h": 8, "w": 16, "x": 0, "y": 43},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "ddot_cloudflare_uniques_daily", "legendFormat": "{{date}}", "refId": "A", "instant": true}],
          "fieldConfig": {"defaults": {"unit": "short", "color": {"mode": "continuous-BlPu"}, "custom": {"fillOpacity": 80, "lineWidth": 1}}},
          "options": {"orientation": "auto", "xTickLabelRotation": -45, "showValue": "auto", "legend": {"showLegend": false}, "reduceOptions": {"calcs": ["lastNotNull"]}}
        },
        {
          "id": 40,
          "title": "Threats Blocked by Type (yesterday)",
          "type": "table",
          "gridPos": {"h": 8, "w": 8, "x": 16, "y": 43},
          "datasource": {"type": "prometheus", "uid": "prometheus"},
          "targets": [{"expr": "ddot_cloudflare_threats_by_type", "legendFormat": "{{type}}", "refId": "A", "instant": true}],
          "fieldConfig": {"defaults": {"unit": "short"}, "overrides": []},
          "options": {"showHeader": true, "sortBy": [{"displayName": "Blocked", "desc": true}]},
          "transformations": [
            {"id": "labelsToFields", "options": {"mode": "columns"}},
            {"id": "organize", "options": {"excludeByName": {"Time": true, "__name__": true, "job": true, "instance": true, "namespace": true, "pod": true, "service": true, "container": true, "endpoint": true}, "renameByName": {"type": "Threat type", "Value": "Blocked"}}}
          ]
        }
      ],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": ["ddot", "kubernetes", "cloudflare"],
      "time": {"from": "now-3h", "to": "now"},
      "timepicker": {},
      "timezone": "browser",
      "title": "Daily Dose of Tech — Platform",
      "uid": "ddot-platform",
      "version": 1
    }
