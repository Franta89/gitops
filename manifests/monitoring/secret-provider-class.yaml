apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: monitoring-akv
  namespace: monitoring
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    clientID: "a3f25662-c80d-4a77-a73c-2a2595ab47b9"
    keyvaultName: "kv-ddot-dev-swc-001"
    tenantId: "eae82d0e-137d-4df8-ab74-34f582042d39"
    objects: |
      array:
        - |
          objectName: grafana-admin-user
          objectType: secret
        - |
          objectName: grafana-admin-password
          objectType: secret
  secretObjects:
    - secretName: grafana-admin-secret
      type: Opaque
      data:
        - objectName: grafana-admin-user
          key: admin-user
        - objectName: grafana-admin-password
          key: admin-password
