apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-app
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  app.json: |
    {
      "description": "TLS and Cloudflare site traffic for dailydoseoftech.org",
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "refresh": "30s",
      "schemaVersion": 38,
      "tags": [
        "ddot",
        "kubernetes",
        "cloudflare"
      ],
      "time": {
        "from": "now-3h",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "browser",
      "title": "DDoT \u2014 Application & Traffic",
      "uid": "ddot-app",
      "version": 1,
      "panels": [
        {
          "type": "row",
          "title": "Site Traffic \u00e2\u20ac\u201d Cloudflare",
          "gridPos": {
            "h": 1,
            "w": 24,
            "x": 0,
            "y": 0
          },
          "id": 30,
          "collapsed": false
        },
        {
          "id": 31,
          "title": "Unique Visitors (today)",
          "type": "stat",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 0,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "ddot_cloudflare_uniques{period=\"today\"}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "fixed",
                "fixedColor": "green"
              }
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value"
          }
        },
        {
          "id": 32,
          "title": "Total Requests (today)",
          "type": "stat",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 8,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "ddot_cloudflare_requests{period=\"today\"}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "fixed",
                "fixedColor": "blue"
              }
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value"
          }
        },
        {
          "id": 33,
          "title": "Bandwidth (today)",
          "type": "stat",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 12,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "ddot_cloudflare_bytes{period=\"today\"}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "color": {
                "mode": "fixed",
                "fixedColor": "purple"
              }
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value"
          }
        },
        {
          "id": 34,
          "title": "Threats Blocked (today)",
          "type": "stat",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 16,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "ddot_cloudflare_threats{period=\"today\"}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "green",
                    "value": null
                  },
                  {
                    "color": "red",
                    "value": 1
                  }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background"
          }
        },
        {
          "id": 35,
          "title": "Requests per Day (last 30d)",
          "type": "barchart",
          "gridPos": {
            "h": 7,
            "w": 12,
            "x": 0,
            "y": 12
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "ddot_cloudflare_requests_daily",
              "legendFormat": "{{date}}",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "fixed",
                "fixedColor": "green"
              },
              "custom": {
                "fillOpacity": 80,
                "lineWidth": 1
              }
            }
          },
          "options": {
            "orientation": "auto",
            "xTickLabelRotation": -45,
            "showValue": "auto",
            "legend": {
              "showLegend": false
            },
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          }
        },
        {
          "id": 36,
          "title": "Page Views per Day (last 30d)",
          "type": "barchart",
          "gridPos": {
            "h": 7,
            "w": 12,
            "x": 12,
            "y": 5
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "ddot_cloudflare_pageviews_daily",
              "legendFormat": "{{date}}",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "fixed",
                "fixedColor": "blue"
              },
              "custom": {
                "fillOpacity": 80,
                "lineWidth": 1
              }
            }
          },
          "options": {
            "orientation": "auto",
            "xTickLabelRotation": -45,
            "showValue": "auto",
            "legend": {
              "showLegend": false
            },
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          }
        },
        {
          "id": 37,
          "title": "Page Views (today)",
          "type": "stat",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 4,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "ddot_cloudflare_pageviews{period=\"today\"}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "fixed",
                "fixedColor": "blue"
              }
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "value"
          }
        },
        {
          "id": 38,
          "title": "TLS Cert \u00e2\u20ac\u201d time to expiry",
          "type": "stat",
          "gridPos": {
            "h": 4,
            "w": 4,
            "x": 20,
            "y": 1
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "min(certmanager_certificate_expiration_timestamp_seconds{name=\"dailydoseoftech-tls\"}) - time()",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "yellow",
                    "value": 1209600
                  },
                  {
                    "color": "green",
                    "value": 2592000
                  }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            },
            "colorMode": "background"
          }
        },
        {
          "id": 39,
          "title": "Unique Visitors per Day (last 30d)",
          "type": "barchart",
          "gridPos": {
            "h": 7,
            "w": 12,
            "x": 0,
            "y": 5
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "ddot_cloudflare_uniques_daily",
              "legendFormat": "{{date}}",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "fixed",
                "fixedColor": "purple"
              },
              "custom": {
                "fillOpacity": 80,
                "lineWidth": 1
              }
            }
          },
          "options": {
            "orientation": "auto",
            "xTickLabelRotation": -45,
            "showValue": "auto",
            "legend": {
              "showLegend": false
            },
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          }
        },
        {
          "id": 40,
          "title": "Threats Blocked by Type (last 30d)",
          "type": "table",
          "gridPos": {
            "h": 7,
            "w": 24,
            "x": 0,
            "y": 19
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "ddot_cloudflare_threats_by_type",
              "legendFormat": "{{type}}",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "showHeader": true,
            "sortBy": [
              {
                "displayName": "Blocked",
                "desc": true
              }
            ]
          },
          "transformations": [
            {
              "id": "labelsToFields",
              "options": {
                "mode": "columns"
              }
            },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true,
                  "__name__": true,
                  "job": true,
                  "instance": true,
                  "namespace": true,
                  "pod": true,
                  "service": true,
                  "container": true,
                  "endpoint": true
                },
                "renameByName": {
                  "type": "Threat type",
                  "Value": "Blocked"
                }
              }
            }
          ]
        },
        {
          "id": 41,
          "title": "Threats Blocked per Day (last 30d)",
          "type": "barchart",
          "gridPos": {
            "h": 7,
            "w": 12,
            "x": 12,
            "y": 12
          },
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "targets": [
            {
              "expr": "ddot_cloudflare_threats_daily",
              "legendFormat": "{{date}}",
              "refId": "A",
              "instant": true
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "color": {
                "mode": "fixed",
                "fixedColor": "red"
              },
              "custom": {
                "fillOpacity": 80,
                "lineWidth": 1
              }
            }
          },
          "options": {
            "orientation": "auto",
            "xTickLabelRotation": -45,
            "showValue": "auto",
            "legend": {
              "showLegend": false
            },
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ]
            }
          }
        }
      ]
    }
