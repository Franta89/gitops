# AGC health probe for Argo CD. Without it AGC probes "/", which argocd-server does
# not answer 200 for, marking the backend unhealthy ("no healthy upstream").
# argocd-server's /healthz returns 200 (it is the chart's own readiness probe path).
apiVersion: alb.networking.azure.io/v1
kind: HealthCheckPolicy
metadata:
  name: argocd-server-healthcheck
  namespace: argocd
spec:
  targetRef:
    group: ""
    kind: Service
    name: argocd-server
  default:
    interval: 15s
    timeout: 5s
    healthyThreshold: 1
    unhealthyThreshold: 3
    http:
      path: /healthz
      match:
        statusCodes:
          - start: 200
            end: 299
