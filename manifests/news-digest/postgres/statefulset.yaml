apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: news-digest
spec:
  serviceName: postgres-svc
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: news-digest-sa
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: init-pgdata
          image: busybox:1.36
          command: ["sh", "-c", "mkdir -p /data/pgdata && chown -R 70:70 /data && chmod 700 /data/pgdata"]
          securityContext:
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "FOWNER", "DAC_OVERRIDE"]
          resources:
            requests:
              cpu: 10m
              memory: 8Mi
            limits:
              cpu: 50m
              memory: 32Mi
          volumeMounts:
            - name: postgres-data
              mountPath: /data
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: "newsdigest"
            - name: POSTGRES_DB
              value: "newsdigest"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          securityContext:
            runAsUser: 70
            runAsGroup: 70
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: akv-secrets
              mountPath: /mnt/secrets
              readOnly: true
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "newsdigest"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: akv-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: news-digest-akv
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: azurefile-postgres
        resources:
          requests:
            storage: 2Gi
