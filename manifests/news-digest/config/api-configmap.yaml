apiVersion: v1
kind: ConfigMap
metadata:
  name: api-script
  namespace: news-digest
data:
  api.py: |
    import os
    import re
    import json
    import html
    import logging
    import threading
    from concurrent.futures import ThreadPoolExecutor
    from datetime import date
    from typing import Optional
    import psycopg2
    import psycopg2.extras
    import requests
    from fastapi import FastAPI, HTTPException, Query, Request
    from fastapi.middleware.cors import CORSMiddleware
    from fastapi.responses import Response
    from azure.identity import WorkloadIdentityCredential
    from azure.storage.blob import BlobServiceClient, ContentSettings
    from azure.core.exceptions import ResourceNotFoundError

    logging.basicConfig(level=os.environ.get("LOG_LEVEL", "INFO"),
                        format="%(asctime)s %(levelname)s %(message)s")
    log = logging.getLogger(__name__)

    DATABASE_URL = os.environ["DATABASE_URL"]

    # --- "Listen" (text-to-speech) config; all keyless via Workload Identity ---
    SPEECH_ENDPOINT      = os.environ.get("SPEECH_ENDPOINT", "").rstrip("/")
    SPEECH_RESOURCE_ID   = os.environ.get("SPEECH_RESOURCE_ID", "")
    SPEECH_OUTPUT_FORMAT = os.environ.get("SPEECH_OUTPUT_FORMAT",
                                          "audio-24khz-48kbitrate-mono-mp3")
    AUDIO_STORAGE_ACCOUNT = os.environ.get("AUDIO_STORAGE_ACCOUNT", "")
    AUDIO_CONTAINER       = os.environ.get("AUDIO_CONTAINER", "audio")

    # Popup friendly name (gender) x page language -> native voice. Carolina/Jacob
    # (Karolina/Jakub in Czech) map to the 2x2 matrix in roadmap.md and the VOICE_*
    # keys in settings-configmap.yaml.
    VOICES = {
        ("f", "en"): os.environ.get("VOICE_CAROLINA_EN", "en-US-AvaMultilingualNeural"),
        ("f", "cs"): os.environ.get("VOICE_CAROLINA_CS", "cs-CZ-VlastaNeural"),
        ("m", "en"): os.environ.get("VOICE_JACOB_EN",    "en-US-AndrewMultilingualNeural"),
        ("m", "cs"): os.environ.get("VOICE_JACOB_CS",    "cs-CZ-AntoninNeural"),
    }
    XML_LANG = {"en": "en-US", "cs": "cs-CZ"}

    AREA_ORDER = ["cloud_computing", "ai_development", "it_security",
                  "financial_markets", "world_news", "euro_news"]
    AREA_LABELS = {
        "en": {"cloud_computing": "Cloud Computing", "ai_development": "AI Development",
               "it_security": "IT Security", "financial_markets": "Financial Markets",
               "world_news": "World News", "euro_news": "Euro News"},
        "cs": {"cloud_computing": "Cloudove technologie", "ai_development": "Vyvoj AI",
               "it_security": "IT Bezpecnost", "financial_markets": "Financni trhy",
               "world_news": "Svetove zpravy", "euro_news": "Evropske zpravy"},
    }

    # Lazily-created singletons (keyless): one credential shared by Speech + Blob.
    _cred = None
    _cred_lock = threading.Lock()
    _blob_service = None

    def _credential():
        global _cred
        if _cred is None:
            with _cred_lock:
                if _cred is None:
                    _cred = WorkloadIdentityCredential()
        return _cred

    def _blob_client():
        global _blob_service
        if _blob_service is None:
            if not AUDIO_STORAGE_ACCOUNT:
                raise HTTPException(status_code=503,
                                    detail="Audio cache not configured")
            url = "https://%s.blob.core.windows.net" % AUDIO_STORAGE_ACCOUNT
            _blob_service = BlobServiceClient(url, credential=_credential())
        return _blob_service

    app = FastAPI(title="Daily Dose of Tech API")
    app.add_middleware(
        CORSMiddleware,
        allow_origins=[
            "https://dailydoseoftech.org",
            "https://www.dailydoseoftech.org",
        ],
        allow_methods=["GET"],
        allow_headers=["*"],
    )

    def get_conn():
        return psycopg2.connect(DATABASE_URL,
                                cursor_factory=psycopg2.extras.RealDictCursor)

    # ------------------------------------------------------------------

    @app.get("/api/health")
    def health():
        return {"status": "ok"}

    @app.get("/api/dates")
    def list_dates():
        conn = get_conn()
        try:
            with conn.cursor() as cur:
                cur.execute(
                    "SELECT date FROM daily_digests ORDER BY date DESC"
                )
                rows = cur.fetchall()
            return [str(r["date"]) for r in rows]
        finally:
            conn.close()

    def _build_digest(rows_summaries, rows_items):
        areas = {}
        for row in rows_summaries:
            areas[row["area"]] = {
                "area": row["area"],
                "overview": row["overview"],
                "overview_cs": row.get("overview_cs") or "",
                "items": [],
            }
        for row in rows_items:
            if row["area_summary_area"] in areas:
                areas[row["area_summary_area"]]["items"].append({
                    "rank": row["rank"],
                    "title": row["title"],
                    "url": row["url"],
                    "summary": row["summary"],
                    "summary_cs": row.get("summary_cs") or "",
                    "is_european": bool(row.get("is_european")),
                })
        for a in areas.values():
            a["items"].sort(key=lambda x: x["rank"])
        return list(areas.values())

    def _fetch_digest_by_date(conn, digest_date: date):
        with conn.cursor() as cur:
            cur.execute(
                "SELECT id FROM daily_digests WHERE date = %s", (digest_date,)
            )
            row = cur.fetchone()
        if not row:
            raise HTTPException(status_code=404,
                                detail=f"No digest found for {digest_date}")
        digest_id = row["id"]

        with conn.cursor() as cur:
            cur.execute("""
                SELECT area, overview, overview_cs FROM area_summaries
                WHERE digest_id = %s ORDER BY area
            """, (digest_id,))
            summaries = cur.fetchall()

        with conn.cursor() as cur:
            cur.execute("""
                SELECT a.area AS area_summary_area,
                       n.rank, n.title, n.url, n.summary, n.summary_cs, n.is_european
                FROM news_items n
                JOIN area_summaries a ON a.id = n.area_summary_id
                WHERE a.digest_id = %s
                ORDER BY a.area, n.rank
            """, (digest_id,))
            items = cur.fetchall()

        return {
            "date": str(digest_date),
            "areas": _build_digest(summaries, items),
        }

    @app.get("/api/digest/today")
    def digest_today():
        conn = get_conn()
        try:
            with conn.cursor() as cur:
                cur.execute(
                    "SELECT date FROM daily_digests ORDER BY date DESC LIMIT 1"
                )
                row = cur.fetchone()
            if not row:
                raise HTTPException(status_code=404,
                                    detail="No digests available yet")
            return _fetch_digest_by_date(conn, row["date"])
        finally:
            conn.close()

    @app.get("/api/digest/{digest_date}")
    def digest_by_date(digest_date: str):
        try:
            d = date.fromisoformat(digest_date)
        except ValueError:
            raise HTTPException(status_code=400, detail="Date must be YYYY-MM-DD")
        conn = get_conn()
        try:
            return _fetch_digest_by_date(conn, d)
        finally:
            conn.close()

    @app.get("/api/areas/{area}/{digest_date}")
    def area_detail(area: str, digest_date: str):
        try:
            d = date.fromisoformat(digest_date)
        except ValueError:
            raise HTTPException(status_code=400, detail="Date must be YYYY-MM-DD")
        conn = get_conn()
        try:
            with conn.cursor() as cur:
                cur.execute("""
                    SELECT a.id, a.overview, a.overview_cs
                    FROM area_summaries a
                    JOIN daily_digests d ON d.id = a.digest_id
                    WHERE d.date = %s AND a.area = %s
                """, (d, area))
                row = cur.fetchone()
            if not row:
                raise HTTPException(status_code=404, detail="Area/date not found")
            with conn.cursor() as cur:
                cur.execute("""
                    SELECT rank, title, url, summary, summary_cs, is_european
                    FROM news_items WHERE area_summary_id = %s
                    ORDER BY rank
                """, (row["id"],))
                items = cur.fetchall()
            return {
                "date": str(d),
                "area": area,
                "overview": row["overview"],
                "overview_cs": row.get("overview_cs") or "",
                "items": list(items),
            }
        finally:
            conn.close()

    @app.get("/api/monthly/{year}/{month}")
    def monthly_summary(year: int, month: int):
        if not (1 <= month <= 12):
            raise HTTPException(status_code=400, detail="Month must be 1-12")
        conn = get_conn()
        try:
            with conn.cursor() as cur:
                cur.execute("""
                    SELECT content, created_at
                    FROM monthly_summaries
                    WHERE year = %s AND month = %s
                """, (year, month))
                row = cur.fetchone()
            if not row:
                raise HTTPException(status_code=404,
                                    detail="Monthly summary not yet generated")
            return {
                "year": year,
                "month": month,
                "content": row["content"],
                "created_at": str(row["created_at"]),
            }
        finally:
            conn.close()

    # ------------------------------------------------------------------
    # "Listen" — text-to-speech with PER-SEGMENT synthesis. Each segment (an
    # area's overview, then each article) is synthesized separately and the clips
    # are concatenated. Because the output is CBR MP3 (no container header),
    # playback time is linear in bytes, so each segment's cumulative byte offset
    # gives its exact start time. We expose those as "markers" so the player can
    # show milestones and jump between articles. Both the MP3 and a small markers
    # manifest (.json) are cached in Blob. Keyless throughout (Workload Identity).
    # ------------------------------------------------------------------

    _bm = re.search(r"(\d+)kbitrate", SPEECH_OUTPUT_FORMAT or "")
    AUDIO_BITRATE_BPS = (int(_bm.group(1)) if _bm else 48) * 1000

    # Bump to invalidate cached audio when synthesis changes (old blobs expire via
    # the 7-day lifecycle rule). v3 = native Czech voice + Czech phonetic respelling
    # of English acronyms and "Cloud".
    AUDIO_VER = "v3"

    def _seconds(nbytes):
        return round(nbytes * 8.0 / AUDIO_BITRATE_BPS, 2)

    def _pick(en, cs, lang):
        return cs if (lang == "cs" and cs) else en

    # An area's read-aloud SEGMENTS: the overview first (prefixed with the spoken
    # area name), then one per article. Each segment carries the marker label the
    # player shows — the area name for the overview, the headline for an article.
    def _area_segments(cur, area_summary_id, area, overview, overview_cs, lang):
        cur.execute("""
            SELECT title, summary, summary_cs FROM news_items
            WHERE area_summary_id = %s ORDER BY rank
        """, (area_summary_id,))
        items = cur.fetchall()
        label = AREA_LABELS[lang].get(area, area)
        segs = []
        ov = _pick(overview, overview_cs, lang)
        if ov:
            segs.append({"type": "overview", "label": label, "text": label + ". " + ov})
        for it in items:
            s = _pick(it["summary"], it.get("summary_cs"), lang)
            title = it["title"] or ""
            if title and s:
                segs.append({"type": "article", "label": title, "text": title + ". " + s})
            elif s:
                segs.append({"type": "article", "label": title, "text": s})
        return segs

    def _fetch_segments(conn, d, area, lang):
        with conn.cursor() as cur:
            cur.execute("""
                SELECT a.id, a.area, a.overview, a.overview_cs
                FROM area_summaries a
                JOIN daily_digests dd ON dd.id = a.digest_id
                WHERE dd.date = %s AND a.area = %s
            """, (d, area))
            r = cur.fetchone()
            if not r:
                return []
            return _area_segments(cur, r["id"], r["area"],
                                  r["overview"], r["overview_cs"], lang)

    # Czech is read by the NATIVE cs-CZ voice (nicest Czech). It can't speak English,
    # so we make English bits sound right by respelling them phonetically in Czech
    # the way a Czech reader would: English acronyms spelled with English letter
    # names (AWS -> "ej dabljú es"), and "Cloud" read with a K (Cloud -> Klaud,
    # because English C = K). A few genuinely Czech abbreviations are spelled the
    # Czech way instead. Applied ONLY to the spoken text, never the marker labels.
    _EN_LETTER = {
        "A": "ej", "B": "bí", "C": "sí", "D": "dý", "E": "í", "F": "ef", "G": "dží",
        "H": "ejč", "I": "aj", "J": "džej", "K": "kej", "L": "el", "M": "em",
        "N": "en", "O": "ou", "P": "pí", "Q": "kjů", "R": "ár", "S": "es", "T": "tý",
        "U": "jů", "V": "ví", "W": "dabljú", "X": "eks", "Y": "vaj", "Z": "zet",
    }
    # Abbreviations a Czech reads in Czech (spelled with Czech letter names).
    _CZ_ACRONYM = {"EU": "é ú", "USA": "ú es á", "OSN": "ó es en", "DPH": "dé pé há"}
    # Acronyms pronounced as a WORD, not letter-by-letter (Title-case so the voice
    # reads them as a word rather than spelling them out).
    _WORD_ACRONYM = {"NATO", "NASA", "RAM", "ROM", "SIM", "GIF", "UNESCO", "UNICEF"}

    def _spell_acronym(tok):
        if tok in _WORD_ACRONYM:
            return tok.capitalize()       # NATO -> "Nato" (read as a word)
        if tok in _CZ_ACRONYM:
            return _CZ_ACRONYM[tok]
        return " ".join(_EN_LETTER.get(c, c) for c in tok)

    def _czech_speech_text(text):
        # "Cloud" -> "Klaud" (any case / Czech declension like Cloudové -> Klaudové).
        text = re.sub(r"(?i)cloud",
                      lambda m: ("K" if m.group(0)[0].isupper() else "k") + "laud",
                      text)
        # Standalone runs of 2+ capitals = acronyms -> spelled English (or Czech if
        # in the set). The \b + negative lookahead avoid matching capital runs inside
        # mixed-case words (so the "AI" in "OpenAI" or "OS" in "macOS" is left alone).
        return re.sub(r"\b[A-Z]{2,}(?![a-z])",
                      lambda m: _spell_acronym(m.group(0)), text)

    def _build_ssml(text, voice, lang):
        xml_lang = XML_LANG.get(lang, "en-US")
        spoken = _czech_speech_text(text) if lang == "cs" else text
        return ("<speak version='1.0' xml:lang='%s'><voice name='%s'><p>%s</p>"
                "<break time='300ms'/></voice></speak>") % (
                    xml_lang, voice, html.escape(spoken))

    def _synthesize(ssml):
        if not (SPEECH_ENDPOINT and SPEECH_RESOURCE_ID):
            raise HTTPException(status_code=503, detail="Speech not configured")
        token = _credential().get_token(
            "https://cognitiveservices.azure.com/.default").token
        resp = requests.post(
            SPEECH_ENDPOINT + "/tts/cognitiveservices/v1",
            data=ssml.encode("utf-8"),
            headers={
                "Authorization": "Bearer aad#%s#%s" % (SPEECH_RESOURCE_ID, token),
                "Content-Type": "application/ssml+xml",
                "X-Microsoft-OutputFormat": SPEECH_OUTPUT_FORMAT,
                "User-Agent": "ddot-listen",
            },
            timeout=120,
        )
        if resp.status_code != 200:
            log.error("Speech synth failed %s: %s", resp.status_code, resp.text[:300])
            raise HTTPException(status_code=502, detail="Speech synthesis failed")
        return resp.content

    def _audio_blob(name):
        return _blob_client().get_container_client(
            AUDIO_CONTAINER).get_blob_client(name)

    def _store(blob, data, content_type, what):
        try:  # caching is best-effort; the caller still serves the result
            blob.upload_blob(data, overwrite=True,
                             content_settings=ContentSettings(content_type=content_type))
        except Exception as e:
            log.warning("cache store failed for %s: %s", what, e)

    # Ensure one area's MP3 + markers manifest exist (cached, else synthesized once
    # per segment in parallel and cached). Returns (mp3_bytes, manifest) where
    # manifest = {"duration": secs, "markers": [{"t","type","label"}, ...]} with
    # area-relative times. (None, None) if the area has no content. The daily
    # warm-up job pre-populates these (see cronjobs/audio-warm.yaml).
    def _ensure_area(d, area, voice, lang):
        base = "%s/%s/%s/%s/%s" % (AUDIO_VER, d.isoformat(), area, voice, lang)
        mp3_blob = _audio_blob(base + ".mp3")
        json_blob = _audio_blob(base + ".json")
        try:
            mp3 = mp3_blob.download_blob().readall()
            manifest = json.loads(json_blob.download_blob().readall())
            return mp3, manifest
        except ResourceNotFoundError:
            pass
        conn = get_conn()
        try:
            segs = _fetch_segments(conn, d, area, lang)
        finally:
            conn.close()
        if not segs:
            return None, None
        vname = VOICES[(voice, lang)]
        with ThreadPoolExecutor(max_workers=4) as ex:
            clips = list(ex.map(
                lambda sg: _synthesize(_build_ssml(sg["text"], vname, lang)), segs))
        markers, buf, offset = [], [], 0
        for sg, clip in zip(segs, clips):
            markers.append({"t": _seconds(offset), "type": sg["type"], "label": sg["label"]})
            buf.append(clip)
            offset += len(clip)
        mp3 = b"".join(buf)
        manifest = {"duration": _seconds(len(mp3)), "markers": markers}
        _store(mp3_blob, mp3, "audio/mpeg", base + ".mp3")
        _store(json_blob, json.dumps(manifest).encode(), "application/json", base + ".json")
        log.info("audio synthesized %s (%d segs, %d bytes)", base, len(segs), len(mp3))
        return mp3, manifest

    # "all" = the six area clips concatenated; markers are the per-area markers with
    # each area's start time added. Reuses the per-area cache (no extra synthesis
    # once areas exist) and caches the assembled MP3 + manifest for instant replay.
    def _ensure_all(d, voice, lang):
        base = "%s/%s/all/%s/%s" % (AUDIO_VER, d.isoformat(), voice, lang)
        mp3_blob = _audio_blob(base + ".mp3")
        json_blob = _audio_blob(base + ".json")
        try:
            mp3 = mp3_blob.download_blob().readall()
            manifest = json.loads(json_blob.download_blob().readall())
            return mp3, manifest
        except ResourceNotFoundError:
            pass
        with ThreadPoolExecutor(max_workers=4) as ex:
            results = list(ex.map(lambda a: _ensure_area(d, a, voice, lang), AREA_ORDER))
        markers, buf, offset = [], [], 0
        for mp3_a, manifest_a in results:
            if not mp3_a:
                continue
            base_t = _seconds(offset)
            for mk in manifest_a["markers"]:
                markers.append({"t": round(base_t + mk["t"], 2),
                                "type": mk["type"], "label": mk["label"]})
            buf.append(mp3_a)
            offset += len(mp3_a)
        if not buf:
            return None, None
        mp3 = b"".join(buf)
        manifest = {"duration": _seconds(len(mp3)), "markers": markers}
        _store(mp3_blob, mp3, "audio/mpeg", base + ".mp3")
        _store(json_blob, json.dumps(manifest).encode(), "application/json", base + ".json")
        log.info("audio assembled %s (%d bytes, %d markers)", base, len(mp3), len(markers))
        return mp3, manifest

    def _ensure(d, category, voice, lang):
        if category == "all":
            return _ensure_all(d, voice, lang)
        return _ensure_area(d, category, voice, lang)

    def _validate(category, voice, lang, d_str):
        if category != "all" and category not in AREA_ORDER:
            raise HTTPException(status_code=400, detail="Unknown category")
        if voice not in ("f", "m"):
            raise HTTPException(status_code=400, detail="voice must be f or m")
        if lang not in ("en", "cs"):
            raise HTTPException(status_code=400, detail="lang must be en or cs")
        try:
            return date.fromisoformat(d_str)
        except ValueError:
            raise HTTPException(status_code=400, detail="Date must be YYYY-MM-DD")

    def _parse_range(range_header, total):
        # Returns (start, end) inclusive for a single "bytes=" range, or None.
        if not range_header or "=" not in range_header:
            return None
        try:
            units, rng = range_header.split("=", 1)
            if units.strip() != "bytes" or "," in rng:
                return None
            start_s, end_s = rng.split("-", 1)
            if start_s == "":                       # suffix: last N bytes
                n = int(end_s)
                start, end = max(0, total - n), total - 1
            else:
                start = int(start_s)
                end = int(end_s) if end_s else total - 1
        except (ValueError, AttributeError):
            return None
        end = min(end, total - 1)
        if start > end or start < 0:
            return None
        return start, end

    # Serve audio with HTTP Range support so the player can seek to any position
    # (a plain 200 only lets the browser seek within what it has already buffered).
    def _mp3_response(data, request):
        total = len(data)
        headers = {"Accept-Ranges": "bytes", "Cache-Control": "public, max-age=86400"}
        rng = _parse_range(request.headers.get("range"), total)
        if rng:
            start, end = rng
            headers["Content-Range"] = "bytes %d-%d/%d" % (start, end, total)
            return Response(content=data[start:end + 1], status_code=206,
                            media_type="audio/mpeg", headers=headers)
        return Response(content=data, media_type="audio/mpeg", headers=headers)

    @app.get("/api/audio")
    def audio(request: Request,
              d_str: str = Query(alias="date"),
              category: str = Query(...),
              voice: str = "f",
              lang: str = "en"):
        d = _validate(category, voice, lang, d_str)
        mp3, _m = _ensure(d, category, voice, lang)
        if mp3 is None:
            raise HTTPException(status_code=404,
                                detail="No content to read for that date/category")
        return _mp3_response(mp3, request)

    # Milestones for the player: overview + per-article start times (seconds) and
    # labels, plus total duration. Reads the cached manifest only (no MP3 download)
    # on the common path; synthesizes if needed.
    @app.get("/api/audio/markers")
    def audio_markers(d_str: str = Query(alias="date"),
                      category: str = Query(...),
                      voice: str = "f",
                      lang: str = "en"):
        d = _validate(category, voice, lang, d_str)
        base = "%s/%s/%s/%s/%s" % (AUDIO_VER, d.isoformat(), category, voice, lang)
        try:
            return json.loads(_audio_blob(base + ".json").download_blob().readall())
        except ResourceNotFoundError:
            pass
        _mp3, manifest = _ensure(d, category, voice, lang)
        if manifest is None:
            raise HTTPException(status_code=404,
                                detail="No content to read for that date/category")
        return manifest
