apiVersion: v1
kind: ConfigMap
metadata:
  name: aggregator-script
  namespace: news-digest
data:
  aggregator.py: |
    import os
    import json
    import logging
    import requests
    import psycopg2
    import psycopg2.extras
    from datetime import datetime, timedelta, timezone
    from openai import AzureOpenAI
    from azure.identity import WorkloadIdentityCredential
    from azure.core.credentials import AccessToken

    logging.basicConfig(level=os.environ.get("LOG_LEVEL", "INFO"),
                        format="%(asctime)s %(levelname)s %(message)s")
    log = logging.getLogger(__name__)

    OPENAI_ENDPOINT    = os.environ["OPENAI_ENDPOINT"]
    OPENAI_DEPLOYMENT  = os.environ["OPENAI_DEPLOYMENT"]
    OPENAI_API_VERSION = os.environ["OPENAI_API_VERSION"]
    DATABASE_URL       = os.environ["DATABASE_URL"]

    # Authoritative RSS/Atom feeds per area. Real-time, free, keyless, and
    # compliant (public syndication). The AI selection layer downstream does the
    # relevance filtering, so feeds are chosen for source quality, not keywords.
    # World News and Financial Markets get wider lists since strong stories there
    # can break anywhere globally.
    AREA_FEEDS = {
        "cloud_computing": [
            "https://thenewstack.io/feed/",
            "https://www.theregister.com/headlines.atom",
            "https://techcrunch.com/feed/",
            "https://www.zdnet.com/news/rss.xml",
            "https://feeds.arstechnica.com/arstechnica/technology-lab",
        ],
        "ai_development": [
            "https://venturebeat.com/category/ai/feed/",
            "https://techcrunch.com/category/artificial-intelligence/feed/",
            "https://www.theverge.com/rss/index.xml",
            "https://feeds.arstechnica.com/arstechnica/technology-lab",
            "https://www.wired.com/feed/tag/ai/latest/rss",
        ],
        "it_security": [
            "https://www.bleepingcomputer.com/feed/",
            "https://feeds.feedburner.com/TheHackersNews",
            "https://krebsonsecurity.com/feed/",
            "https://www.securityweek.com/feed/",
            "https://www.darkreading.com/rss.xml",
        ],
        "financial_markets": [
            "https://www.cnbc.com/id/20910258/device/rss/rss.html",
            "https://feeds.marketwatch.com/marketwatch/topstories/",
            "https://finance.yahoo.com/news/rssindex",
            "https://www.investing.com/rss/news.rss",
            "https://feeds.bbci.co.uk/news/business/rss.xml",
            "https://www.theguardian.com/uk/business/rss",
            "https://seekingalpha.com/market_currents.xml",
        ],
        "world_news": [
            "https://feeds.bbci.co.uk/news/world/rss.xml",
            "https://www.aljazeera.com/xml/rss/all.xml",
            "https://www.theguardian.com/world/rss",
            "https://feeds.npr.org/1004/rss.xml",
            "https://rss.dw.com/rdf/rss-en-world",
            "https://www.france24.com/en/rss",
            "http://rss.cnn.com/rss/edition_world.rss",
        ],
    }

    AREA_LABELS = {
        "cloud_computing":   "Cloud Computing",
        "ai_development":    "AI Development",
        "it_security":       "IT Security",
        "financial_markets": "Financial Markets",
        "world_news":        "World News",
    }

    # Look-back window per area. Cross-day dedup (known_urls) prevents anything
    # already published in the digest from repeating, so a wider window simply
    # gives low-volume areas more candidates to choose from.
    DEFAULT_WINDOW_HOURS = 48
    WINDOW_HOURS = {
        "cloud_computing": 72,
        "it_security":     72,
    }

    # ------------------------------------------------------------------
    # Token provider that wraps WorkloadIdentityCredential for AzureOpenAI
    # ------------------------------------------------------------------
    class _TokenProvider:
        def __init__(self):
            self._cred = WorkloadIdentityCredential()

        def __call__(self) -> str:
            token: AccessToken = self._cred.get_token(
                "https://cognitiveservices.azure.com/.default"
            )
            return token.token

    # ------------------------------------------------------------------
    # Database helpers
    # ------------------------------------------------------------------
    def get_conn():
        return psycopg2.connect(DATABASE_URL)

    def create_tables(conn):
        with conn.cursor() as cur:
            cur.execute("""
                CREATE TABLE IF NOT EXISTS daily_digests (
                    id         SERIAL PRIMARY KEY,
                    date       DATE NOT NULL UNIQUE,
                    created_at TIMESTAMPTZ NOT NULL DEFAULT NOW()
                );
                CREATE TABLE IF NOT EXISTS area_summaries (
                    id        SERIAL PRIMARY KEY,
                    digest_id INT NOT NULL REFERENCES daily_digests(id) ON DELETE CASCADE,
                    area      VARCHAR(50) NOT NULL,
                    overview  TEXT NOT NULL,
                    created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
                    UNIQUE(digest_id, area)
                );
                CREATE TABLE IF NOT EXISTS news_items (
                    id              SERIAL PRIMARY KEY,
                    area_summary_id INT NOT NULL REFERENCES area_summaries(id) ON DELETE CASCADE,
                    rank            SMALLINT NOT NULL CHECK (rank BETWEEN 1 AND 5),
                    title           TEXT NOT NULL,
                    url             TEXT NOT NULL,
                    summary         TEXT NOT NULL
                );
                CREATE TABLE IF NOT EXISTS monthly_summaries (
                    id         SERIAL PRIMARY KEY,
                    year       SMALLINT NOT NULL,
                    month      SMALLINT NOT NULL CHECK (month BETWEEN 1 AND 12),
                    content    TEXT NOT NULL,
                    created_at TIMESTAMPTZ NOT NULL DEFAULT NOW(),
                    UNIQUE(year, month)
                );
                CREATE INDEX IF NOT EXISTS idx_daily_digests_date
                    ON daily_digests(date DESC);
                CREATE INDEX IF NOT EXISTS idx_area_summaries_digest
                    ON area_summaries(digest_id);
                CREATE INDEX IF NOT EXISTS idx_news_items_area_summary
                    ON news_items(area_summary_id);
            """)
            # Widen rank constraint from 1-3 to 1-5 on existing installations
            cur.execute("""
                DO $$
                BEGIN
                    BEGIN
                        ALTER TABLE news_items DROP CONSTRAINT news_items_rank_check;
                    EXCEPTION WHEN undefined_object THEN NULL;
                    END;
                    BEGIN
                        ALTER TABLE news_items ADD CONSTRAINT news_items_rank_check
                            CHECK (rank BETWEEN 1 AND 5);
                    EXCEPTION WHEN duplicate_object THEN NULL;
                    END;
                END $$;
            """)
            # Add Czech summary columns (idempotent)
            cur.execute("""
                DO $$
                BEGIN
                    BEGIN
                        ALTER TABLE area_summaries ADD COLUMN overview_cs TEXT NOT NULL DEFAULT '';
                    EXCEPTION WHEN duplicate_column THEN NULL;
                    END;
                    BEGIN
                        ALTER TABLE news_items ADD COLUMN summary_cs TEXT NOT NULL DEFAULT '';
                    EXCEPTION WHEN duplicate_column THEN NULL;
                    END;
                END $$;
            """)
        conn.commit()

    def get_known_urls(conn):
        with conn.cursor() as cur:
            cur.execute("SELECT url FROM news_items")
            return {row[0] for row in cur.fetchall()}

    def upsert_digest(conn, today):
        with conn.cursor() as cur:
            cur.execute("""
                INSERT INTO daily_digests (date) VALUES (%s)
                ON CONFLICT (date) DO UPDATE SET created_at = NOW()
                RETURNING id
            """, (today,))
            return cur.fetchone()[0]

    def upsert_area_summary(conn, digest_id, area, overview, overview_cs=""):
        with conn.cursor() as cur:
            cur.execute("""
                INSERT INTO area_summaries (digest_id, area, overview, overview_cs)
                VALUES (%s, %s, %s, %s)
                ON CONFLICT (digest_id, area)
                DO UPDATE SET overview = EXCLUDED.overview,
                              overview_cs = EXCLUDED.overview_cs,
                              created_at = NOW()
                RETURNING id
            """, (digest_id, area, overview, overview_cs))
            return cur.fetchone()[0]

    def insert_news_items(conn, area_summary_id, items):
        with conn.cursor() as cur:
            cur.execute("DELETE FROM news_items WHERE area_summary_id = %s",
                        (area_summary_id,))
            for item in items:
                cur.execute("""
                    INSERT INTO news_items (area_summary_id, rank, title, url, summary, summary_cs)
                    VALUES (%s, %s, %s, %s, %s, %s)
                """, (area_summary_id, item["rank"], item["title"],
                      item["url"], item["summary"], item.get("summary_cs", "")))

    # ------------------------------------------------------------------
    # RSS retrieval — real-time, keyless, compliant
    # ------------------------------------------------------------------
    def _domain_of(url: str) -> str:
        try:
            from urllib.parse import urlparse
            host = urlparse(url).netloc.lower()
            return host[4:] if host.startswith("www.") else host
        except Exception:
            return ""

    # Pure package indexes / changelog aggregators that flood keyword queries
    # with low-importance release notes. Capped harder than ordinary sources.
    AGGREGATOR_DOMAINS = {
        "pypi.org", "npmjs.com", "github.com", "pypistats.org",
        "libraries.io", "anaconda.org", "crates.io", "rubygems.org",
    }
    PER_DOMAIN_CAP    = 2   # ordinary sources
    PER_AGGREGATOR_CAP = 1  # package indexes / changelog feeds

    _HTTP_HEADERS = {"User-Agent": "ddot-aggregator/1.0 (+https://dailydoseoftech.org)"}

    def _strip_html(text: str) -> str:
        import re as _re
        from html import unescape
        return unescape(_re.sub(r"<[^>]+>", "", text or "")).strip()

    # Pull recent entries from a list of RSS/Atom feeds. Each feed is fetched
    # with a timeout and parsed independently — a broken or stale feed is logged
    # and skipped, never aborting the area. Entries older than `since` are
    # dropped; entries without a parseable date are kept (feeds are recent).
    def rss_fetch(feeds: list[str], since: datetime, per_feed: int = 20) -> list[dict]:
        import feedparser
        from calendar import timegm
        results = []
        for url in feeds:
            try:
                resp = requests.get(url, headers=_HTTP_HEADERS, timeout=15)
                resp.raise_for_status()
                parsed = feedparser.parse(resp.content)
            except Exception as exc:
                log.warning("RSS feed failed (%s): %s", url, exc)
                continue
            feed_title = ""
            if parsed.get("feed"):
                feed_title = parsed.feed.get("title", "")
            feed_title = feed_title or _domain_of(url)
            count = 0
            for entry in parsed.entries:
                tm = entry.get("published_parsed") or entry.get("updated_parsed")
                if tm is not None:
                    published = datetime.fromtimestamp(timegm(tm), tz=timezone.utc)
                    if published < since:
                        continue
                link = entry.get("link", "")
                if not link:
                    continue
                results.append({
                    "title":   _strip_html(entry.get("title", "")),
                    "url":     link,
                    "source":  feed_title,
                    "snippet": _strip_html(entry.get("summary", ""))[:500],
                })
                count += 1
                if count >= per_feed:
                    break
            log.info("RSS %s -> %d recent entries", _domain_of(url), count)
        log.info("RSS total %d candidates from %d feeds", len(results), len(feeds))
        return results

    # Cap how many articles any single source contributes so one busy feed
    # (e.g. a package index on release day) cannot dominate an area.
    def diversify_by_source(candidates: list[dict], limit: int = 25) -> list[dict]:
        seen: dict[str, int] = {}
        kept = []
        for c in candidates:
            domain = _domain_of(c["url"])
            cap = PER_AGGREGATOR_CAP if domain in AGGREGATOR_DOMAINS else PER_DOMAIN_CAP
            if seen.get(domain, 0) >= cap:
                continue
            seen[domain] = seen.get(domain, 0) + 1
            kept.append(c)
            if len(kept) >= limit:
                break
        log.info("Diversified %d candidates down to %d across %d sources",
                 len(candidates), len(kept), len(seen))
        return kept

    # Per-area prompt context: persona, what to select, how to summarise, how to synthesise
    AREA_PROMPTS = {
        "cloud_computing": {
            "persona": "a principal cloud architect and infrastructure engineer",
            "select": (
                "architectural announcements, cloud provider releases, Kubernetes/container "
                "updates, serverless and platform engineering shifts, performance benchmarks, "
                "and infrastructure product launches"
            ),
            "summarize": (
                "Cite cloud provider names, service names, and measurable metrics "
                "(latency, cost, throughput). Explain architectural implications and "
                "operational impact for platform teams."
            ),
            "synthesize": (
                "Identify specific platform shifts, vendor movements, and "
                "infrastructure engineering implications."
            ),
        },
        "ai_development": {
            "persona": "a principal AI/ML engineer and researcher",
            "select": (
                "model releases, benchmark results, training/inference improvements, "
                "framework updates, API changes, and research breakthroughs"
            ),
            "summarize": (
                "Cite model names, parameter counts, benchmark scores (MMLU, HumanEval etc.), "
                "and architectural innovations. Explain engineering implications for ML teams."
            ),
            "synthesize": (
                "Identify convergent model architecture trends, tooling shifts, and "
                "concrete implications for AI engineering teams."
            ),
        },
        "it_security": {
            "persona": "a principal security engineer and threat analyst",
            "select": (
                "CVE disclosures, active exploits, patch releases, threat actor campaigns, "
                "data breaches, ransomware incidents, and regulatory/compliance changes"
            ),
            "summarize": (
                "Cite CVE IDs, CVSS scores, affected product versions, and patch availability. "
                "Explain attack vectors, affected components, and remediation steps."
            ),
            "synthesize": (
                "Identify active threat patterns, systemic vulnerabilities, and "
                "priority remediation actions for security teams."
            ),
        },
        "financial_markets": {
            "persona": "a senior financial analyst and market strategist",
            "select": (
                "earnings reports, IPO filings or pricings, M&A deals, central bank decisions, "
                "significant index or stock moves, analyst upgrades/downgrades, regulatory "
                "actions on financial institutions, and major investor activity. "
                "INCLUDE tech companies when the news is financially significant (IPO, earnings beat, "
                "major M&A). EXCLUDE pure technology product announcements with no direct market impact."
            ),
            "summarize": (
                "Cite specific figures: revenue, EPS, market cap change, deal value, "
                "interest rate level, index % move, or trading volume. "
                "Explain market implications, investor sentiment, and sector impact. "
                "Do NOT discuss the technology itself — focus on the financial angle."
            ),
            "synthesize": (
                "Identify market-moving trends, sector rotations, macro signals, and "
                "investment implications across the selected stories."
            ),
        },
        "world_news": {
            "persona": "a senior international affairs correspondent and geopolitical analyst",
            "select": (
                "diplomatic developments, geopolitical conflicts, peace negotiations, "
                "humanitarian crises, climate agreements, military events, and major "
                "international policy shifts. "
                "EXCLUDE technology product news and financial market reports unless "
                "directly tied to geopolitical consequences."
            ),
            "summarize": (
                "Name the countries, parties, leaders, and agreements involved. "
                "State dates, casualty figures, or treaty terms where available. "
                "Explain geopolitical implications and regional impact."
            ),
            "synthesize": (
                "Identify geopolitical fault lines, diplomatic shifts, and "
                "humanitarian implications across the selected stories."
            ),
        },
    }

    # ------------------------------------------------------------------
    # AI summarisation — area-aware persona and selection criteria
    # ------------------------------------------------------------------
    def summarize_area(client: AzureOpenAI, area_key: str, area_label: str,
                       candidates: list[dict], known_urls: set[str],
                       relaxed: bool = False) -> dict:
        fresh = [c for c in candidates if c["url"] not in known_urls]
        if not fresh:
            log.warning("No fresh articles for %s — falling back to all candidates", area_label)
            fresh = candidates

        ctx = AREA_PROMPTS.get(area_key, AREA_PROMPTS["cloud_computing"])

        # Normal mode enforces source diversity to stop one feed dominating.
        # Relaxed mode (used by the empty-area retry) drops the diversity gate so
        # a thin pool still yields the best available story instead of nothing.
        if relaxed:
            select_rule = (
                'Select 1-3 articles — the single most important available story, '
                'plus up to two more only if clearly significant. The pool is thin, '
                'so do NOT reject everything: surface the best available even if modest.'
            )
        else:
            select_rule = (
                'Select 3-5 articles. '
                'Favour the most important developments reported across the world, not '
                'whatever a single source published most often. Prefer at least 3 '
                'distinct sources (see the "source" field) and take no more than one item '
                'from any single source. Exclude routine package-release, changelog, and '
                'version-bump posts unless the release is genuinely major news.'
            )

        prompt = (
            f'You are {ctx["persona"]} covering "{area_label}".\n'
            f'Below are {len(fresh)} recent news articles from roughly the past 1-3 days.\n\n'
            'Task:\n'
            f'1. {select_rule} Prioritise: {ctx["select"]}. '
            'Skip marketing copy, opinion pieces, and near-duplicate stories.\n'
            f'2. For each selected article write a precise summary (4-6 sentences). '
            f'{ctx["summarize"]} '
            'Do NOT use vague phrases like "highlights the importance of".\n'
            f'3. Write a concise synthesis paragraph (3-5 sentences). '
            f'{ctx["synthesize"]} '
            'Be direct — use names, numbers, and concrete facts.\n'
            '4. Translate the "summary" and "overview" fields into Czech for the _cs variants.\n\n'
            'Return ONLY valid JSON — no markdown fences, no extra keys:\n'
            '{\n'
            '  "items": [\n'
            '    {"rank": 1, "title": "...", "url": "...", "summary": "...", "summary_cs": "..."},\n'
            '    ...\n'
            '  ],\n'
            '  "overview": "...",\n'
            '  "overview_cs": "..."\n'
            '}\n\n'
            'Candidate articles (JSON array):\n'
            + json.dumps(fresh, ensure_ascii=False)
        )
        response = client.chat.completions.create(
            model=OPENAI_DEPLOYMENT,
            messages=[{"role": "user", "content": prompt}],
            temperature=0.2,
            max_tokens=4000,
        )
        if response.choices[0].finish_reason == "length":
            log.warning("AI response for %s hit the token limit — JSON may be truncated",
                        area_label)
        import re
        raw = response.choices[0].message.content.strip()
        raw = re.sub(r'^```(?:json)?\s*', '', raw)
        raw = re.sub(r'\s*```$', '', raw).strip()
        raw = re.sub(r',\s*([}\]])', r'\1', raw)
        try:
            result = json.loads(raw)
        except json.JSONDecodeError:
            match = re.search(r'\{.*\}', raw, re.DOTALL)
            if not match:
                raise ValueError(f"Could not parse AI response as JSON: {raw[:200]}")
            cleaned = re.sub(r',\s*([}\]])', r'\1', match.group(0))
            result = json.loads(cleaned)
        return result

    # ------------------------------------------------------------------
    # Monthly summary
    # ------------------------------------------------------------------
    def generate_monthly_summary(conn, client: AzureOpenAI, year: int, month: int):
        with conn.cursor(cursor_factory=psycopg2.extras.DictCursor) as cur:
            cur.execute("""
                SELECT a.area, a.overview, n.title, n.url, n.summary
                FROM daily_digests d
                JOIN area_summaries a ON a.digest_id = d.id
                JOIN news_items n ON n.area_summary_id = a.id
                WHERE EXTRACT(YEAR FROM d.date) = %s
                  AND EXTRACT(MONTH FROM d.date) = %s
                ORDER BY a.area, n.rank
            """, (year, month))
            rows = cur.fetchall()

        if not rows:
            log.warning("No data found for %d-%02d — skipping monthly summary", year, month)
            return

        grouped: dict[str, list] = {}
        for row in rows:
            grouped.setdefault(row["area"], []).append(
                f"- {row['title']}: {row['summary']}"
            )

        prompt_parts = [f"Monthly Technical Digest — {year}-{month:02d}\n"]
        for area, items in grouped.items():
            label = AREA_LABELS.get(area, area)
            prompt_parts.append(f"\n## {label}\n" + "\n".join(items[:30]))

        prompt = "\n".join(prompt_parts) + (
            "\n\nWrite a comprehensive monthly technical summary covering major architectural "
            "shifts, key vulnerability disclosures, platform releases, and engineering trends "
            "across all four domains. Use precise technical language. Highlight cross-domain "
            "dependencies and converging patterns. 4-6 paragraphs: one per domain plus a "
            "cross-cutting synthesis paragraph."
        )

        response = client.chat.completions.create(
            model=OPENAI_DEPLOYMENT,
            messages=[{"role": "user", "content": prompt}],
            temperature=0.4,
            max_tokens=2000,
        )
        content = response.choices[0].message.content.strip()

        with conn.cursor() as cur:
            cur.execute("""
                INSERT INTO monthly_summaries (year, month, content)
                VALUES (%s, %s, %s)
                ON CONFLICT (year, month) DO UPDATE SET content = EXCLUDED.content,
                    created_at = NOW()
            """, (year, month, content))
        conn.commit()
        log.info("Monthly summary written for %d-%02d", year, month)

    # ------------------------------------------------------------------
    # Main
    # ------------------------------------------------------------------
    def main():
        import sys
        mode = sys.argv[1] if len(sys.argv) > 1 else "daily"

        conn = get_conn()
        create_tables(conn)

        token_provider = _TokenProvider()
        client = AzureOpenAI(
            azure_ad_token_provider=token_provider,
            azure_endpoint=OPENAI_ENDPOINT,
            api_version=OPENAI_API_VERSION,
        )

        now_utc = datetime.now(timezone.utc)

        if mode == "monthly":
            first_of_this_month = now_utc.replace(day=1)
            prev = first_of_this_month - timedelta(days=1)
            generate_monthly_summary(conn, client, prev.year, prev.month)
            conn.close()
            return

        # Daily mode
        today = now_utc.date()
        known_urls = get_known_urls(conn)
        digest_id = upsert_digest(conn, today)
        conn.commit()

        failed_areas = []
        for area in AREA_FEEDS:
            # Isolate each area: a failure in one must not abort the others.
            try:
                log.info("Processing area: %s", area)
                window = WINDOW_HOURS.get(area, DEFAULT_WINDOW_HOURS)
                since = now_utc - timedelta(hours=window)

                # Pull and de-duplicate entries across the area's RSS feeds.
                candidates = rss_fetch(AREA_FEEDS[area], since)
                seen_urls: set[str] = set()
                merged = []
                for c in candidates:
                    if c["url"] and c["url"] not in seen_urls:
                        seen_urls.add(c["url"])
                        merged.append(c)
                candidates = merged
                log.info("Area %s: %d unique candidates (window %dh)",
                         area, len(candidates), window)

                if not candidates:
                    log.error("No RSS results for %s — skipping", area)
                    continue
                diversified = diversify_by_source(candidates)
                result = summarize_area(client, area, AREA_LABELS[area], diversified, known_urls)
                items = result.get("items", [])

                if not items:
                    # Never leave an area with an overview but zero stories.
                    # Retry on the full pool, ignoring cross-day dedup AND relaxing
                    # the diversity gate so a thin pool still yields the best story.
                    log.warning("AI returned 0 items for %s — retrying relaxed "
                                "(no dedup, no diversity gate)", area)
                    result = summarize_area(client, area, AREA_LABELS[area],
                                            candidates, set(), relaxed=True)
                    items = result.get("items", [])
                    if not items:
                        log.error("Still 0 items for %s after relaxed retry", area)

                for item in items:
                    # Clamp rank into the DB CHECK range (1-5) to avoid a
                    # constraint violation aborting the insert.
                    try:
                        item["rank"] = max(1, min(5, int(item.get("rank", 1))))
                    except (TypeError, ValueError):
                        item["rank"] = 1

                area_summary_id = upsert_area_summary(
                    conn, digest_id, area, result["overview"], result.get("overview_cs", "")
                )
                insert_news_items(conn, area_summary_id, items)
                conn.commit()
                log.info("Area %s done — %d items written", area, len(items))
            except Exception:
                conn.rollback()
                failed_areas.append(area)
                log.exception("Area %s failed — continuing with remaining areas", area)

        conn.close()
        if failed_areas:
            log.error("Daily digest complete for %s with failures: %s",
                      today, ", ".join(failed_areas))
        else:
            log.info("Daily digest complete for %s", today)

    if __name__ == "__main__":
        main()
