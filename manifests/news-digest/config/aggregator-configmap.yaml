    # ------------------------------------------------------------------
    # AI summarisation — area-aware persona and selection criteria
    # ------------------------------------------------------------------
    def summarize_area(client: OpenAI, area_key: str, area_label: str,
                       candidates: list[dict], known_urls: set[str],
                       relaxed: bool = False) -> dict:
        fresh = [c for c in candidates if c["url"] not in known_urls]
        if not fresh:
            log.warning("No fresh articles for %s — falling back to all candidates", area_label)
            fresh = candidates

        ctx = AREA_PROMPTS.get(area_key, AREA_PROMPTS["cloud_computing"])

        # Normal mode enforces source diversity to stop one feed dominating.
        # Relaxed mode (used by the empty-area retry) drops the diversity gate so
        # a thin pool still yields the best available story instead of nothing.
        if relaxed:
            select_rule = (
                'Select 1-3 articles — the single most important available story, '
                'plus up to two more only if clearly significant. The pool is thin, '
                'so do NOT reject everything: surface the best available even if modest.'
            )
        else:
            # Primarily global coverage, with one slot reserved for the European
            # angle of this area so the digest stays relevant to a European reader.
            euro = ctx.get("european", "")
            euro_clause = (
                f' Aim for roughly ONE of the selected articles to cover the European '
                f'dimension of this area ({euro}). Favour CONTINENTAL Europe (Germany, '
                f'France, the Nordics, Benelux, Iberia, Italy, Poland and beyond), not only '
                f'the UK. Mark that article (and any other European one) with '
                f'"is_european": true and all others with "is_european": false. If the '
                f'candidate pool contains no genuinely relevant European story, do not force '
                f'or invent one — keep all five global rather than promote a weak European item.'
            ) if euro else ''
            select_rule = (
                'Select about 5 articles (4-6 is acceptable). '
                'Favour the most important developments reported across the world, not '
                'whatever a single source published most often. Prefer at least 3 '
                'distinct sources (see the "source" field) and take no more than one item '
                'from any single source. Exclude routine package-release, changelog, and '
                'version-bump posts unless the release is genuinely major news.'
                + euro_clause
            )

        exclude = ctx.get("exclude", "")
        exclude_line = (
            f'\nSTRICT EXCLUSION — these belong to a different area and MUST be omitted '
            f'here, even if prominent or widely reported: {exclude}.'
        ) if exclude else ''

        prompt = (
            f'You are {ctx["persona"]} covering "{area_label}".\n'
            f'Below are {len(fresh)} recent news articles from roughly the past 1-3 days.\n\n'
            'Task:\n'
            f'1. {select_rule} Prioritise: {ctx["select"]}. '
            'Skip marketing copy, opinion pieces, and near-duplicate stories.'
            f'{exclude_line}\n'
            f'2. For each selected article write a precise summary (4-6 sentences). '
            f'{ctx["summarize"]} '
            'Do NOT use vague phrases like "highlights the importance of".\n'
            f'3. Write a concise synthesis paragraph (3-5 sentences). '
            f'{ctx["synthesize"]} '
            'Be direct — use names, numbers, and concrete facts.\n'
            '4. Translate the "summary" and "overview" fields into Czech for the _cs variants.\n\n'
            'Return ONLY valid JSON — no markdown fences, no extra keys. Set "is_european" '
            'to true for stories about Europe/the EU and false otherwise:\n'
            '{\n'
            '  "items": [\n'
            '    {"rank": 1, "title": "...", "url": "...", "summary": "...", "summary_cs": "...", "is_european": false},\n'
            '    ...\n'
            '  ],\n'
            '  "overview": "...",\n'
            '  "overview_cs": "..."\n'
            '}\n\n'
            'Candidate articles (JSON array):\n'
            + json.dumps(fresh, ensure_ascii=False)
        )
        response = client.chat.completions.create(
            model=OPENAI_DEPLOYMENT,
            messages=[{"role": "user", "content": prompt}],
            temperature=0.2,
            max_completion_tokens=4000,
        )
        if response.choices[0].finish_reason == "length":
            log.warning("AI response for %s hit the token limit — JSON may be truncated",
                        area_label)
        import re
        raw = response.choices[0].message.content.strip()
        raw = re.sub(r'^```(?:json)?\s*', '', raw)
        raw = re.sub(r'\s*```$', '', raw).strip()
        raw = re.sub(r',\s*([}\]])', r'\1', raw)
        try:
            result = json.loads(raw)
        except json.JSONDecodeError:
            match = re.search(r'\{.*\}', raw, re.DOTALL)
            if not match:
                raise ValueError(f"Could not parse AI response as JSON: {raw[:200]}")
            cleaned = re.sub(r',\s*([}\]])', r'\1', match.group(0))
            result = json.loads(cleaned)
        return result

    # ------------------------------------------------------------------
    # Monthly summary
    # ------------------------------------------------------------------
    def generate_monthly_summary(conn, client: OpenAI, year: int, month: int):
        with conn.cursor(cursor_factory=psycopg2.extras.DictCursor) as cur:
            cur.execute("""
                SELECT a.area, a.overview, n.title, n.url, n.summary
                FROM daily_digests d
                JOIN area_summaries a ON a.digest_id = d.id
                JOIN news_items n ON n.area_summary_id = a.id
                WHERE EXTRACT(YEAR FROM d.date) = %s
                  AND EXTRACT(MONTH FROM d.date) = %s
                ORDER BY a.area, n.rank
            """, (year, month))
            rows = cur.fetchall()

        if not rows:
            log.warning("No data found for %d-%02d — skipping monthly summary", year, month)
            return

        grouped: dict[str, list] = {}
        for row in rows:
            grouped.setdefault(row["area"], []).append(
                f"- {row['title']}: {row['summary']}"
            )

        prompt_parts = [f"Monthly Technical Digest — {year}-{month:02d}\n"]
        for area, items in grouped.items():
            label = AREA_LABELS.get(area, area)
            prompt_parts.append(f"\n## {label}\n" + "\n".join(items[:30]))

        prompt = "\n".join(prompt_parts) + (
            "\n\nWrite a comprehensive monthly technical summary covering major architectural "
            "shifts, key vulnerability disclosures, platform releases, and engineering trends "
            "across all areas. Use precise technical language. Highlight cross-domain "
            "dependencies and converging patterns. Write one paragraph per area covered "
            "above plus a final cross-cutting synthesis paragraph."
        )

        response = client.chat.completions.create(
            model=OPENAI_DEPLOYMENT,
            messages=[{"role": "user", "content": prompt}],
            temperature=0.4,
            max_completion_tokens=2000,
        )
        content = response.choices[0].message.content.strip()

        with conn.cursor() as cur:
            cur.execute("""
                INSERT INTO monthly_summaries (year, month, content)
                VALUES (%s, %s, %s)
                ON CONFLICT (year, month) DO UPDATE SET content = EXCLUDED.content,
                    created_at = NOW()
            """, (year, month, content))
        conn.commit()
        log.info("Monthly summary written for %d-%02d", year, month)

    # ------------------------------------------------------------------
    # Main
    # ------------------------------------------------------------------
    def main():
        import sys
        mode = sys.argv[1] if len(sys.argv) > 1 else "daily"

        conn = get_conn()
        create_tables(conn)

        # Azure OpenAI v1 API: stock OpenAI client against the /openai/v1/ base
        # URL with an Entra ID bearer token (no dated api-version — the v1 API
        # drops it, avoiding preview/dated-route breakage). The token is valid for
        # the whole short-lived job.
        client = OpenAI(
            base_url=OPENAI_ENDPOINT,
            api_key=_TokenProvider()(),
        )

        now_utc = datetime.now(timezone.utc)

        if mode == "monthly":
            first_of_this_month = now_utc.replace(day=1)
            prev = first_of_this_month - timedelta(days=1)
            generate_monthly_summary(conn, client, prev.year, prev.month)
            conn.close()
            return

        # Daily mode
        today = now_utc.date()
        known_urls = get_known_urls(conn)
        digest_id = upsert_digest(conn, today)
        conn.commit()

        # URLs already picked by an earlier area in THIS run. A story belongs to a
        # single area per digest, so once an area claims it, later areas exclude it
        # (prevents the same article appearing in e.g. AI Development and Cloud
        # Computing). Areas are processed in AREA_FEEDS order, so earlier areas win.
        selected_urls: set[str] = set()

        failed_areas = []
        for area in AREA_FEEDS:
            # Isolate each area: a failure in one must not abort the others.
            try:
                log.info("Processing area: %s", area)
                window = WINDOW_HOURS.get(area, DEFAULT_WINDOW_HOURS)
                since = now_utc - timedelta(hours=window)

                # Pull and de-duplicate entries across the area's RSS feeds.
                candidates = rss_fetch(AREA_FEEDS[area], since)
                seen_urls: set[str] = set()
                merged = []
                for c in candidates:
                    if c["url"] and c["url"] not in seen_urls:
                        seen_urls.add(c["url"])
                        merged.append(c)
                candidates = merged

                # Security incidents are routed to IT Security only — strip them
                # from these areas' pools so the model can't place them here.
                if area in SECURITY_ONLY_AREAS:
                    before = len(candidates)
                    candidates = [c for c in candidates if not is_security_incident(c)]
                    if before != len(candidates):
                        log.info("Area %s: dropped %d security-incident stories "
                                 "(routed to IT Security)", area, before - len(candidates))

                # Pure financial-milestone stories (valuations, IPOs) belong to
                # Financial Markets — strip them from the tech areas.
                if area in FINANCIAL_ONLY_AREAS:
                    before = len(candidates)
                    candidates = [c for c in candidates if not is_financial_milestone(c)]
                    if before != len(candidates):
                        log.info("Area %s: dropped %d financial-milestone stories "
                                 "(routed to Financial Markets)", area, before - len(candidates))

                log.info("Area %s: %d unique candidates (window %dh)",
                         area, len(candidates), window)

                if not candidates:
                    log.error("No RSS results for %s — skipping", area)
                    continue
                diversified = diversify_by_source(candidates)
                # Exclude cross-day history AND anything already claimed earlier in
                # this run, so no story is repeated across areas.
                result = summarize_area(client, area, AREA_LABELS[area], diversified,
                                        known_urls | selected_urls)
                items = result.get("items", [])

                if not items:
                    # Never leave an area with an overview but zero stories. Retry on
                    # the full pool ignoring cross-day dedup, but STILL exclude stories
                    # already claimed by an earlier area this run (no cross-area dupes).
                    log.warning("AI returned 0 items for %s — retrying relaxed "
                                "(no cross-day dedup, no diversity gate)", area)
                    result = summarize_area(client, area, AREA_LABELS[area],
                                            candidates, set(selected_urls), relaxed=True)
                    items = result.get("items", [])
                    if not items:
                        log.error("Still 0 items for %s after relaxed retry", area)

                for item in items:
                    # Coerce rank to an int for sorting; it is renumbered 1..n below.
                    try:
                        item["rank"] = max(1, int(item.get("rank", 1)))
                    except (TypeError, ValueError):
                        item["rank"] = 1

                # Clean the returned items: drop URLs already claimed by an earlier
                # area this run, drop within-area repeats, and (for security-only
                # areas) drop any security incident the model echoed back. Then
                # reserve the survivors so later areas can't reuse them.
                deduped = []
                local_seen: set[str] = set()
                local_titles: set[str] = set()
                for it in items:
                    url = it.get("url")
                    title_key = re.sub(r"\W+", " ", it.get("title", "")).strip().lower()
                    if not url or url in selected_urls or url in local_seen:
                        continue
                    if title_key and title_key in local_titles:
                        continue  # same story from a different feed/URL within this area
                    if area in SECURITY_ONLY_AREAS and is_security_incident(it):
                        continue
                    if area in FINANCIAL_ONLY_AREAS and is_financial_milestone(it):
                        continue
                    local_seen.add(url)
                    if title_key:
                        local_titles.add(title_key)
                    deduped.append(it)
                items = deduped
                for item in items:
                    selected_urls.add(item["url"])

                if not items:
                    log.warning("No items left for %s after dedup/filter — skipping", area)
                    continue

                # Normalise the European flag: world_news is global-only, euro_news is
                # Europe-only (both segregated by area); the mixed areas keep the
                # model's per-item judgement.
                for it in items:
                    if area == "euro_news":
                        it["is_european"] = True
                    elif area == "world_news":
                        it["is_european"] = False
                    else:
                        it["is_european"] = bool(it.get("is_european", False))

                # In the mixed areas show global stories first, then the European
                # ones (so the frontend can draw a "Europe" divider before them).
                # Renumber rank 1..n afterwards so the displayed order is clean.
                if area in EUROPE_TAGGED_AREAS:
                    items.sort(key=lambda it: (1 if it["is_european"] else 0,
                                               it.get("rank", 99)))
                else:
                    items.sort(key=lambda it: it.get("rank", 99))
                for i, it in enumerate(items, start=1):
                    it["rank"] = i

                area_summary_id = upsert_area_summary(
                    conn, digest_id, area, result["overview"], result.get("overview_cs", "")
                )
                insert_news_items(conn, area_summary_id, items)
                conn.commit()
                log.info("Area %s done — %d items written", area, len(items))
            except Exception:
                conn.rollback()
                failed_areas.append(area)
                log.exception("Area %s failed — continuing with remaining areas", area)

        conn.close()
        if failed_areas:
            log.error("Daily digest complete for %s with failures: %s",
                      today, ", ".join(failed_areas))
        else:
            log.info("Daily digest complete for %s", today)

    if __name__ == "__main__":
        main()
