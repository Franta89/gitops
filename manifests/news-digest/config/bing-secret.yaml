# Bing Search v7 uses key-based auth only (no RBAC/Managed Identity support).
# After running `terraform apply`, replace the placeholder with:
#   terraform output -raw bing_api_key   (in infra-terraform repo)
# TODO: migrate to SealedSecrets before any shared use.
apiVersion: v1
kind: Secret
metadata:
  name: bing-secret
  namespace: news-digest
type: Opaque
stringData:
  BING_API_KEY: "REPLACE_WITH_TERRAFORM_OUTPUT_bing_api_key"
