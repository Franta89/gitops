# Pulls secrets from Azure Key Vault and materialises them as K8s Secrets
# consumed by postgres, api, and aggregator pods via envFrom.
# Fill in the REPLACE_WITH_* values from terraform outputs after apply.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: news-digest-akv
  namespace: news-digest
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    clientID: "a3f25662-c80d-4a77-a73c-2a2595ab47b9"
    keyvaultName: "kv-ddot-dev-swc-001"
    tenantId: "eae82d0e-137d-4df8-ab74-34f582042d39"
    objects: |
      array:
        - |
          objectName: postgres-password
          objectType: secret
        - |
          objectName: database-url
          objectType: secret
  secretObjects:
    - secretName: postgres-secret
      type: Opaque
      data:
        - objectName: postgres-password
          key: POSTGRES_PASSWORD
        - objectName: database-url
          key: DATABASE_URL
