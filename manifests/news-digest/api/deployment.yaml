apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: news-digest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: news-api
  template:
    metadata:
      labels:
        app: news-api
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: news-digest-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: python:3.12-slim
          command: ["/bin/sh", "-c"]
          # Runs as non-root (uid 1000): pip --user installs into $HOME/.local,
          # and `python -m uvicorn` avoids relying on the off-PATH console script.
          args:
            - |
              pip install --user --quiet \
                "fastapi~=0.115.6" \
                "uvicorn~=0.32.1" \
                "psycopg2-binary~=2.9.10" &&
              python -m uvicorn api:app --host 0.0.0.0 --port 8000
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8000
          workingDir: /app
          env:
            - name: HOME
              value: /tmp
          envFrom:
            - configMapRef:
                name: news-digest-settings
            - secretRef:
                name: postgres-secret
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - name: api-script
              mountPath: /app/api.py
              subPath: api.py
            - name: akv-secrets
              mountPath: /mnt/secrets
              readOnly: true
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 90
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 120
            periodSeconds: 20
      volumes:
        - name: api-script
          configMap:
            name: api-script
        - name: akv-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: news-digest-akv
