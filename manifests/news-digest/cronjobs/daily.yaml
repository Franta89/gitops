# Runs at 06:10 CET (05:10 UTC) — 10 minutes after the cluster starts.
# Looks back 25 hours for news, skips URLs already stored in the DB.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: news-digest-daily
  namespace: news-digest
spec:
  schedule: "10 5 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: news-digest-worker
            azure.workload.identity/use: "true"
        spec:
          serviceAccountName: news-digest-sa
          restartPolicy: OnFailure
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: aggregator
              image: python:3.12-slim
              command: ["/bin/sh", "-c"]
              args:
                - |
                  pip install --quiet \
                    "openai~=1.57.4" \
                    "azure-identity~=1.19.0" \
                    "psycopg2-binary~=2.9.10" \
                    "requests~=2.32.3" &&
                  python /scripts/aggregator.py daily
              workingDir: /scripts
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              envFrom:
                - configMapRef:
                    name: news-digest-settings
                - secretRef:
                    name: newsapi-secret
                - secretRef:
                    name: postgres-secret
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              volumeMounts:
                - name: aggregator-script
                  mountPath: /scripts/aggregator.py
                  subPath: aggregator.py
          volumes:
            - name: aggregator-script
              configMap:
                name: aggregator-script
