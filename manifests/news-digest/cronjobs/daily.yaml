# Runs at 06:30 CET/CEST daily. timeZone handles DST automatically.
# Pulls news from authoritative RSS feeds (48-72h window), skips URLs
# already stored in the DB.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: news-digest-daily
  namespace: news-digest
spec:
  schedule: "30 6 * * *"
  timeZone: "Europe/Prague"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: news-digest-worker
            azure.workload.identity/use: "true"
        spec:
          serviceAccountName: news-digest-sa
          restartPolicy: OnFailure
          securityContext:
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: aggregator
              image: python:3.12-slim
              command: ["/bin/sh", "-c"]
              args:
                - |
                  pip install --quiet \
                    "openai~=1.57.4" \
                    "azure-identity~=1.19.0" \
                    "psycopg2-binary~=2.9.10" \
                    "requests~=2.32.3" \
                    "feedparser~=6.0.11" &&
                  python /scripts/aggregator.py daily
              workingDir: /scripts
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
              envFrom:
                - configMapRef:
                    name: news-digest-settings
                - secretRef:
                    name: postgres-secret
              resources:
                requests:
                  cpu: 100m
                  memory: 256Mi
                limits:
                  cpu: 500m
                  memory: 512Mi
              volumeMounts:
                - name: aggregator-script
                  mountPath: /scripts/aggregator.py
                  subPath: aggregator.py
                - name: akv-secrets
                  mountPath: /mnt/secrets
                  readOnly: true
          volumes:
            - name: aggregator-script
              configMap:
                name: aggregator-script
            - name: akv-secrets
              csi:
                driver: secrets-store.csi.k8s.io
                readOnly: true
                volumeAttributes:
                  secretProviderClass: news-digest-akv
