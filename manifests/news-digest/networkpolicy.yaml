# Restrict which pods may reach PostgreSQL.
# Only the API deployment and CronJob worker pods are allowed on port 5432.
# All other ingress to postgres is denied by default.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-ingress
  namespace: news-digest
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: news-api
        - podSelector:
            matchLabels:
              app: news-digest-worker
      ports:
        - protocol: TCP
          port: 5432
---
# NOTE: the frontend has NO NetworkPolicy. It is the app's public web entry point
# and is protected at the edge (Cloudflare proxy + AGC WAF origin-lock). Pinning an
# ipBlock to AGC's source IP proved unreliable under the Cilium dataplane (AGC enters
# from outside the pod network and is not seen as the delegated-subnet CIDR), so
# in-cluster ingress to the frontend is left open. The sensitive tiers — Postgres and
# the API — remain restricted by the identity-based (podSelector) policies here.
#
# Allow the frontend pods to reach the API within the namespace. Public traffic
# reaches the API only via the frontend nginx proxy, so no AGC ipBlock is needed here.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-ingress
  namespace: news-digest
spec:
  podSelector:
    matchLabels:
      app: news-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: news-frontend
      ports:
        - protocol: TCP
          port: 8000
