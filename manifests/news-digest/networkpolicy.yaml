# Restrict which pods may reach PostgreSQL.
# Only the API deployment and CronJob worker pods are allowed on port 5432.
# All other ingress to postgres is denied by default.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-ingress
  namespace: news-digest
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: news-api
        - podSelector:
            matchLabels:
              app: news-digest-worker
      ports:
        - protocol: TCP
          port: 5432
---
# Allow the Application Gateway for Containers data path to reach the frontend on
# port 80. AGC delivers traffic from its delegated subnet (snet-alb), not from an
# in-cluster controller pod, so we match the subnet CIDR with an ipBlock instead
# of a namespaceSelector. Keep this CIDR in sync with the snet-alb address_prefix
# in infra-terraform (terraform output alb_subnet_cidr).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-ingress
  namespace: news-digest
spec:
  podSelector:
    matchLabels:
      app: news-frontend
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 10.0.2.0/24
      ports:
        - protocol: TCP
          port: 80
---
# Allow the frontend pods to reach the API within the namespace. Public traffic
# reaches the API only via the frontend nginx proxy, so no AGC ipBlock is needed here.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-ingress
  namespace: news-digest
spec:
  podSelector:
    matchLabels:
      app: news-api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: news-frontend
      ports:
        - protocol: TCP
          port: 8000
