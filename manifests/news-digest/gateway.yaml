# Gateway API replacement for the old NGINX Ingress. Programs the Azure
# Application Gateway for Containers (AGC) referenced by the alb-id annotation.
#
# The AGC resource is created in infra-terraform (module app-gateway-containers).
# Fill the annotation from:  terraform output alb_id
#
# allowedRoutes.namespaces.from: All lets routes in other namespaces (e.g. the
# Grafana HTTPRoute in `monitoring`) attach to these listeners.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ddot-gateway
  namespace: news-digest
  annotations:
    alb.networking.azure.io/alb-id: /subscriptions/71ba5d23-aba5-4515-9582-259879889653/resourceGroups/rg-ddot-dev-swc-001/providers/Microsoft.ServiceNetworking/trafficControllers/alb-ddot-dev-swc-001
    # NOTE: the ALB controller's Gateway API path creates and manages its OWN
    # frontend per Gateway — you cannot pin a pre-created frontend here. The public
    # FQDN to use for the Cloudflare CNAME is the Gateway's runtime address:
    #   kubectl get gateway ddot-gateway -n news-digest -o jsonpath='{.status.addresses[0].value}'
spec:
  gatewayClassName: azure-alb-external
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - kind: Secret
            name: dailydoseoftech-tls
      allowedRoutes:
        namespaces:
          from: All
