# Minimal Deployment whose sole purpose is to keep the AKV CSI volume mounted
# so the cloudflare-api-token K8s Secret stays alive in the cert-manager namespace.
# Uses a pause container — zero CPU/memory overhead.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: secret-sync
  namespace: cert-manager
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secret-sync
  template:
    metadata:
      labels:
        app: secret-sync
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: cert-manager-secret-sa
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: pause
          image: registry.k8s.io/pause:3.9
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 1m
              memory: 4Mi
            limits:
              cpu: 10m
              memory: 16Mi
          volumeMounts:
            - name: akv-secrets
              mountPath: /mnt/secrets
              readOnly: true
      volumes:
        - name: akv-secrets
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: cert-manager-akv
