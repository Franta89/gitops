# Pulls the Cloudflare API token from Azure Key Vault and materialises it as
# the K8s Secret that cert-manager's ClusterIssuer references.
# Fill in the three REPLACE_WITH_* values from terraform outputs after apply.
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: cert-manager-akv
  namespace: cert-manager
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    clientID: "19dcd42a-34cf-4cf2-9cf4-995d1a51abe9"
    keyvaultName: "kv-ddot-dev-swc-001"
    tenantId: "eae82d0e-137d-4df8-ab74-34f582042d39"
    objects: |
      array:
        - |
          objectName: cloudflare-api-token
          objectType: secret
  secretObjects:
    - secretName: cloudflare-api-token
      type: Opaque
      data:
        - objectName: cloudflare-api-token
          key: api-token
